name: Daily ETL Pipeline

on:
  schedule:
    # Runs at 00:15 AM La Paz time (UTC-7) = 7:15 AM UTC
    - cron: '15 7 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL pipeline
        env:
          ADVERTISER_IDS: "${{ vars.ADVERTISER_IDS }}"
          SPECIAL_SPOT: "${{ vars.SPECIAL_SPOT }}"
          FILE_PREFIXES: "${{ vars.FILE_PREFIXES }}"
          GOOGLE_SHEET_NAME: "${{ vars.GOOGLE_SHEET_NAME }}"
          GMAIL_LABEL: "${{ vars.GMAIL_LABEL }}"
          DATA_DIR: "data"
          GOOGLE_CREDENTIALS_BASE64: "${{ secrets.GOOGLE_CREDENTIALS }}"
          GMAIL_CLIENT_SECRET_BASE64: "${{ secrets.GMAIL_CLIENT_SECRET }}"
          GMAIL_TOKEN_BASE64: "${{ secrets.GMAIL_TOKEN }}"
        run: python main.py
